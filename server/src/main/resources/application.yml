spring:
  application:
    name: lang-game

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/langgame}
    username: ${DB_USER:langgame}
    password: ${DB_PASSWORD:langgame}

  jpa:
    hibernate:
      ddl-auto: validate        # схему ведёт Flyway, не Hibernate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

# Параметры JWT (Mediator/Security)
app:
  jwt:
    # В проде задаётся через переменную окружения; здесь дефолт для разработки.
    secret: ${JWT_SECRET:change-me-dev-secret-change-me-dev-secret-32b}
    expiration-ms: 86400000     # 24 часа

# OpenAPI / Swagger UI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: ${SERVER_PORT:8137}
