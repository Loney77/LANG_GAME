services:
  db:
    image: postgres:16-alpine
    container_name: langgame-db
    environment:
      POSTGRES_DB: langgame
      POSTGRES_USER: langgame
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - langgame-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langgame -d langgame"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  server:
    build:
      context: ../server
    container_name: langgame-server
    environment:
      DB_URL: jdbc:postgresql://db:5432/langgame
      DB_USER: langgame
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: "8137"

      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60 -Dapp.seed.sozluk-file=/data/sozluk.words.json"
    volumes:
      - ../data:/data:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: langgame-caddy
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - server
    restart: unless-stopped

volumes:
  langgame-pgdata:
  caddy-data:
  caddy-config:
